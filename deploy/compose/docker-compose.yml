# deploy/compose/docker-compose.yml
name: microshop-dev
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microshop-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  identity-api:
    build:
      context: ../..
      dockerfile: src/Services/Identity/Identity.API/Dockerfile
    image: microshop-identity-api
    container_name: microshop-identity-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SqlServer__ConnectionString=Server=sqlserver,1433;Database=MicroShopIdentity;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Port=5672
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Jwt__Issuer=${IDENTITY_JWT_ISSUER:-microshop-identity}
      - Jwt__Audience=${IDENTITY_JWT_AUDIENCE:-microshop-clients}
      - Jwt__Algorithm=RS256
      - Jwt__PrivateKeyPem=${IDENTITY_JWT_PRIVATE_KEY}
      - Jwt__PublicKeyPem=${IDENTITY_JWT_PUBLIC_KEY}
      - Serilog__WriteTo__0__Name=Seq
      - Serilog__WriteTo__0__Args__serverUrl=http://seq:5341
      - Serilog__MinimumLevel=Information
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
      - rabbitmq
      - otel-collector
      - seq

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: microshop-rabbit
    environment:
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq_stream advertised_host localhost
    ports:
      - "5672:5672"
      - "15672:15672" # Management UI
      - "15692:15692" # /metrics (prometheus)
    command: >
      bash -lc "rabbitmq-plugins enable --offline rabbitmq_management rabbitmq_prometheus &&
                rabbitmq-server"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 12

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: microshop-otel
    command: ["--config=/etc/otel/otel-collector.yaml"]
    volumes:
      - ../otel:/etc/otel:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
      - "13133:13133" # health_check extension
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: microshop-jaeger
    environment:
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
    ports:
      - "16686:16686" # UI
      - "14250:14250" # gRPC ingest from collector
    # Jaeger will receive traces from otel-collector

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: microshop-prom
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4.5
    container_name: microshop-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger

  seq:
    image: datalust/seq:2024.1
    container_name: microshop-seq
    environment:
      - ACCEPT_EULA=${SEQ_ACCEPT_EULA}
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_FIRSTRUN_ADMINPASSWORD}
      - SEQ_BASEURI=http://localhost:8081
    restart: unless-stopped
    ports:
      - "5341:5341"   # ingestion
      - "8081:80"     # UI (ajusta si ya usas 8091)
    volumes:
      - seq-data:/data

volumes:
  mssql-data:
  seq-data:
